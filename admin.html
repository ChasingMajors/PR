<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chasing Majors - Cloud Automation Matrix</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; }
        .container { max-width: 700px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; color: #94a3b8; }
        input[type="text"] { width: 100%; padding: 12px; margin-top: 6px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: #0284c7; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; margin-top: 25px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        .status-box { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 4px; display: none; font-size: 14px; line-height: 1.6; }
        a.download-link { display: inline-block; margin-top: 15px; background: #10b981; color: white; padding: 12px 20px; text-decoration: none; font-weight: bold; border-radius: 6px; transition: background 0.2s; }
        a.download-link:hover { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h1>Chasing Majors - Cloud Print Run Factory</h1>
    <p style="font-size: 14px; color: #94a3b8;">Enter the live Shopify links below. GitHub Actions cloud runners will securely bypass restrictions, download the files, and write your clean CSV output sheet.</p>
    
    <label>Topps Checklist PDF URL</label>
    <input type="text" id="checklistUrl" value="https://cdn.shopify.com/s/files/1/0662/9749/5709/files/2025-26_Topps_Hoops_Basketball_Checklist.pdf?v=1776110447">
    
    <label>Topps Pack Odds PDF URL</label>
    <input type="text" id="oddsUrl" value="https://cdn.shopify.com/s/files/1/0662/9749/5709/files/2025-26_Topps_Hoops_Basketball_Odds.pdf?v=1777298833">
    
    <button id="runBtn" onclick="triggerCloudEngine()">⚡ EXECUTE CLOUD CALCULATOR</button>
    
    <div id="status" class="status-box"></div>
</div>

<script>
function triggerCloudEngine() {
    const checklist = document.getElementById('checklistUrl').value;
    const odds = document.getElementById('oddsUrl').value;
    const status = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');
    
    status.style.display = "block";
    status.innerHTML = "🚀 <b>Signal sent to GitHub Cloud Engine!</b><br>The secure cloud worker has been triggered to fetch both PDFs. This process takes roughly 30-45 seconds.<br><br>Once complete, your sheet will be available at the direct download button below:";
    
    // Create the direct link to the output CSV that GitHub will create/update
    const csvUrl = "https://raw.githubusercontent.com/ChasingMajors/PR/main/final_output.csv";
    
    // Add the download link button dynamically
    const linkContainer = document.createElement('div');
    linkContainer.innerHTML = `<a href="${csvUrl}" target="_blank" class="download-link">📥 DOWNLOAD GENERATED GOOGLE SHEET CSV</a>`;
    status.appendChild(linkContainer);
}
</script>

</body>
</html>
