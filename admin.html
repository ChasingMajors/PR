<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chasing Majors - Prefix Range Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; }
        .container { max-width: 750px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        p { font-size: 14px; color: #94a3b8; margin-bottom: 25px; line-height: 1.6; }
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .upload-box { background: #0f172a; border: 2px dashed #475569; border-radius: 8px; padding: 30px 15px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
        .upload-box:hover { border-color: #38bdf8; }
        .upload-box input[type="file"] { display: none; }
        .upload-box .icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .upload-box .label { font-size: 14px; font-weight: 600; color: #cbd5e1; }
        .upload-box .filename { font-size: 12px; color: #10b981; margin-top: 8px; display: none; font-weight: bold; word-break: break-all; }
        button { width: 100%; background: #0284c7; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .status-box { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 4px; display: none; font-size: 14px; line-height: 1.6; white-space: pre-line; }
        .download-btn { display: block; text-align: center; margin-top: 20px; background: #10b981; color: white; padding: 14px; text-decoration: none; font-weight: bold; border-radius: 6px; transition: background 0.2s; }
        .download-btn:hover { background: #059669; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Chasing Majors - Automated Print Run Factory</h1>
    <p>Upload your Checklist and Pack Odds PDFs. This version automatically classifies major groups (Base, Insert, Autograph) and scans code number ranges to accurately compute subset counts.</p>
    
    <div class="upload-row">
        <div class="upload-box" onclick="document.getElementById('checklistFile').click()">
            <span class="icon">📄</span>
            <span class="label">Upload Checklist PDF</span>
            <div id="checkName" class="filename"></div>
            <input type="file" id="checklistFile" accept=".pdf" onchange="handleFileSelect('checklistFile', 'checkName')">
        </div>

        <div class="upload-box" onclick="document.getElementById('oddsFile').click()">
            <span class="icon">📊</span>
            <span class="label">Upload Pack Odds PDF</span>
            <div id="oddsName" class="filename"></div>
            <input type="file" id="oddsFile" accept=".pdf" onchange="handleFileSelect('oddsFile', 'oddsName')">
        </div>
    </div>
    
    <textarea id="serialOverrides" style="width:100%;height:120px;margin-bottom:20px;background:#0f172a;color:#fff;border:1px solid #475569;padding:10px;border-radius:6px;" placeholder="Paste serial overrides here&#10;Example:&#10;Base Pixel Burst Blue /149"></textarea>

<button id="runBtn" onclick="processUploadedPDFs()">⚡ GENERATE PRINT RUN CSV</button>
    
    <div id="status" class="status-box"></div>
    <div id="debugArea" style="margin-top:20px;display:none;">
    <h3 style="color:#38bdf8;">Parser Debug View</h3>
    <pre id="debugOutput" style="background:#020617;color:#e2e8f0;padding:15px;border-radius:8px;max-height:400px;overflow:auto;font-size:12px;white-space:pre-wrap;"></pre>
</div>

<div id="downloadArea"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

let generatedCsvData = "";
let productName = "Product_Print_Runs";

function handleFileSelect(inputId, nameId) {
    const file = document.getElementById(inputId).files[0];
    if (file) {
        const nameDiv = document.getElementById(nameId);
        nameDiv.innerText = `✓ ${file.name}`;
        nameDiv.style.display = "block";
    }
}

async function readPdfText(file) {
    const arrayBuffer = await file.arrayBuffer();
    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
    const pdf = await loadingTask.promise;
    let fullText = "";
    
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const lines = [];
        let lastY = null;
        let currentLine = [];

        textContent.items.forEach(item => {
            const y = Math.round(item.transform[5]);

            if (lastY !== null && Math.abs(y - lastY) > 2) {
                lines.push(currentLine.join(" ").trim());
                currentLine = [];
            }

            currentLine.push(item.str);
            lastY = y;
        });

        if (currentLine.length) {
            lines.push(currentLine.join(" ").trim());
        }

        fullText += lines.join("\n") + "\n";
    }
    return fullText;
}

function cleanKey(str) {
    return str.toLowerCase().replace(/[^a-z0-9]/g, '').trim();
}

async function processUploadedPDFs() {
    const checkFile = document.getElementById('checklistFile').files[0];
    const oddsFile = document.getElementById('oddsFile').files[0];
    const status = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');
    const downloadArea = document.getElementById('downloadArea');
    
    if (!checkFile || !oddsFile) {
        alert("Please select both your Checklist and Pack Odds PDF files first.");
        return;
    }
    
    status.style.display = "block";
    runBtn.disabled = true;
    downloadArea.innerHTML = "";
    
    try {
        status.innerHTML = "🔄 <b>Step 1/3:</b> Mapping checklist file stream...";
        const checklistText = await readPdfText(checkFile);
        
        status.innerHTML = "🔄 <b>Step 2/3:</b> Parsing pack odds tables...";
        const oddsText = await readPdfText(oddsFile);
        
        status.innerHTML = "🧮 <b>Step 3/3:</b> Calculating exact subset boundaries...";
        await new Promise(r => setTimeout(r, 50));

        const titleMatch = checklistText.match(/(202\d-\d+.*?)(?=Checklist|Odds|\n)/i);
        productName = titleMatch ? titleMatch[1].trim() : "Topps Compiled Product Run";

        const checklistLines = checklistText.split("\n");

        // STEP 1: PARSE THE MASTER SET LIST OUT OF PACK ODDS
        const ratioRegex = /([A-Za-z0-9\s#&\-\/\’\‘\“\”\(\)]+?)\s*(?:1\s*:\s*([\d\.,]+))/g;
        let targetSubsets = [];
        let trackedKeys = new Set();
        let match;

        while ((match = ratioRegex.exec(oddsText)) !== null) {
            let originalName = match[1].trim();
            let baseName = originalName.split('(')[0].split('-')[0].trim();
            
            if (baseName.length > 3 && !["pack odds", "odds per", "minimum", "retail configuration", "total packs"].some(x => baseName.toLowerCase().includes(x))) {
                let key = cleanKey(baseName);
                if (!trackedKeys.has(key) && !key.startsWith("base")) {
                    trackedKeys.add(key);
                    targetSubsets.push(baseName);
                }
            }
        }

        // STEP 2: SEGMENT CHECKLIST BY TYPE PILLARS & SCAN EXACT RANGES
        let currentCategory = "BASE";
        let subsetSizeMap = {};
        let currentSubset = null;
        
        // Trackers for codes inside a single subset section
        let currentSectionNumbers = [];
        let currentSectionAlphas = new Set();

        const mainCategories = ["BASE", "INSERT", "AUTOGRAPH", "RELIC", "MEMORABILIA", "VARIATION"];

        function saveCurrentSubsetData() {
            if (!currentSubset) return;
            
            let finalCount = 25; // Safe default fallback
            
            if (currentSectionNumbers.length > 0) {
                let maxNum = Math.max(...currentSectionNumbers);
                let minNum = Math.min(...currentSectionNumbers);
                // Handle cases like base sets spanning 1-300 or inserts spanning 1-25
                finalCount = (maxNum - minNum) + 1;
                if (finalCount < maxNum) finalCount = maxNum; 
            } else if (currentSectionAlphas.size > 0) {
                finalCount = currentSectionAlphas.size;

                if (cleanKey(currentSubset).includes("base")) {
                    finalCount = 300;
                }
            }
            
            subsetSizeMap[cleanKey(currentSubset)] = { size: finalCount, group: currentCategory };
            
            // Reset trackers
            currentSectionNumbers = [];
            currentSectionAlphas = new Set();
        }

        for (let i = 0; i < checklistLines.length; i++) {
            let line = checklistLines[i].trim();
            if (line.length < 2) continue;

            // A. Check for category shifts
            let cleanLine = line.toUpperCase().replace(/S$/, ''); // Normalize INSERTS -> INSERT
            if (mainCategories.includes(cleanLine)) {
                saveCurrentSubsetData();
                currentCategory = cleanLine === "INSERT" ? "INSERT" : cleanLine;
                currentSubset = null;
                continue;
            }

            // B. Check for subset name shifts
            let foundNewSubset = targetSubsets.find(sub => line.toLowerCase() === sub.toLowerCase() || line.toLowerCase().startsWith(sub.toLowerCase() + " "));
            if (foundNewSubset) {
                saveCurrentSubsetData();
                currentSubset = foundNewSubset;
                continue;
            }

            // C. Scan line for structural card codes to find the true set size
            // Pattern 1: Alphanumeric with index number (e.g., BH-1, BH-25, D-15, 300)
            let numMatch = line.match(/(?:^|\s)(?:[A-Z]{1,4}-)?(\d+)(?:\s|$)/i);
            if (numMatch) {
                let val = parseInt(numMatch[1]);
                if (val > 0 && val < 500) {
                    currentSectionNumbers.push(val);
                }
            }
            
            // Pattern 2: Pure Alphanumeric strings (e.g., HS-AE, HS-AED)
            let alphaMatch = line.match(/(?:^|\s)([A-Z]{1,4}-[A-Z]{2,4})(?:\s|$)/i);
            if (alphaMatch) {
                currentSectionAlphas.add(alphaMatch[1]);
            }
        }
        
        // Save terminal block
        saveCurrentSubsetData();

        // STEP 3: ASSEMBLE SPREADSHEET OUTPUT
        let debugLog = [];

        const csvRows = [
            ["Product Name", "Product Group Type", "Card Variant Type/Name", "Checklist Subset Size (C)", "Total Production Footprint", "Calculated Print Run Per Player"]
        ];

        const totalEstimatedPacks = 7627500;

        const serialOverrideMap = {};
        const overrideText = document.getElementById('serialOverrides').value || '';

        overrideText.split('\n').forEach(line => {
            const m = line.match(/(.+?)\s*\/(\d+)/);
            if (m) {
                serialOverrideMap[cleanKey(m[1])] = parseInt(m[2]);
            }
        });

        function getParentSubsetName(name) {
            return cleanKey(
                name
                    .replace(/\/\d+/g, '')
                    .replace(/pixel burst/ig, '')
                    .replace(/light burst/ig, '')
                    .replace(/rainbow/ig, '')
                    .replace(/green hoops/ig, '')
                    .replace(/orange hoops/ig, '')
                    .replace(/platinum/ig, '')
                    .replace(/purple/ig, '')
                    .replace(/blue/ig, '')
                    .replace(/green/ig, '')
                    .replace(/gold/ig, '')
                    .replace(/orange/ig, '')
                    .replace(/black/ig, '')
                    .replace(/red and orange/ig, '')
                    .replace(/purple and blue/ig, '')
                    .replace(/green and blue/ig, '')
                    .replace(/gold and green/ig, '')
                    .replace(/red/ig, '')
                    .replace(/and/ig, '')
                    .trim()
            );
        }
 
        let resetRatioRegex = /([A-Za-z0-9\s#&\-\/\’\‘\“\”\(\)]+?)\s*(?:1\s*:\s*([\d\.,]+))/g;

        while ((match = resetRatioRegex.exec(oddsText)) !== null) {
            let variantName = match[1].trim();
            let packRatio = parseFloat(match[2].replace(/,/g, ''));

            if (!variantName || isNaN(packRatio) || packRatio <= 0) continue;
            if (["pack odds", "odds per", "minimum", "retail configuration", "total packs"].some(x => variantName.toLowerCase().includes(x))) continue;

            let groupType = "INSERT";
            let checklistCount = 25;
            let cleanVariant = getParentSubsetName(variantName.split('(')[0]);

            const exactBaseNames = [
                "base",
                "baserainbow",
                "basepixelburst",
                "baselightburst"
            ];

            if (exactBaseNames.some(x => cleanVariant.startsWith(x))) {
                groupType = "BASE";
                checklistCount = 300;
            } else {
                let matchedMapItem = null;
                for (let key in subsetSizeMap) {
                    if (cleanVariant.includes(key) || key.includes(cleanVariant)) {
                        matchedMapItem = subsetSizeMap[key];
                        break;
                    }
                }

                if (matchedMapItem) {
                    checklistCount = matchedMapItem.size;
                    groupType = matchedMapItem.group;

                    debugLog.push(`[MATCH] ${variantName} -> ${checklistCount} cards (${groupType})`);
                } else {
                    if (variantName.toLowerCase().includes("auto")) {
                        groupType = "AUTOGRAPH";
                        checklistCount = 15;
                    } else if (variantName.toLowerCase().includes("relic")) {
                        groupType = "RELIC";
                        checklistCount = 20;
                    }
                }
            }

            let totalFootprint = 0;
            let calculatedPrintRun = 0;

            const overrideSerial = serialOverrideMap[cleanVariant];
            const explicitSerialMatch = overrideSerial
                ? [null, overrideSerial]
                : variantName.match(/\/(\d+)/);
            if (explicitSerialMatch) {
                calculatedPrintRun = parseInt(explicitSerialMatch[1]);
                totalFootprint = calculatedPrintRun * checklistCount;
            } else {
                totalFootprint = Math.round(totalEstimatedPacks / packRatio);
                calculatedPrintRun = Math.round(totalFootprint / checklistCount);
            }

            if (calculatedPrintRun > 0 && totalFootprint > 0) {
                csvRows.push([
                    productName,
                    groupType,
                    variantName,
                    checklistCount,
                    totalFootprint,
                    calculatedPrintRun
                ]);
            }
        }

        const csvContent = csvRows.map(row => row.map(val => {
            if (typeof val === 'string') return `"${val.replace(/"/g, '""')}"`;
            return val;
        }).join(",")).join("\n");

        generatedCsvData = "data:text/csv;charset=utf-8," + encodeURIComponent(csvContent);
        
        document.getElementById('debugArea').style.display = 'block';
        document.getElementById('debugOutput').textContent = debugLog.join('\n');

        status.innerHTML = `✅ <b>Analysis Complete!</b>\nProduct Identified: <b>${productName}</b>\nParser debug view restored.`;
        downloadArea.innerHTML = `<button onclick="downloadCSV()" class="download-btn" style="width:100%; border:none; cursor:pointer;">📥 DOWNLOAD PRINT RUN CSV</button>`;
        
    } catch (error) {
        console.error(error);
        status.innerHTML = "❌ <b>Processing Failure:</b> An error occurred reading the text stream patterns inside your files.";
    } finally {
        runBtn.disabled = false;
    }
}

function downloadCSV() {
    const link = document.createElement("a");
    link.setAttribute("href", generatedCsvData);
    link.setAttribute("download", `${productName.replace(/[^a-zA-Z0-9]/g, '_')}_Final_Print_Runs.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
