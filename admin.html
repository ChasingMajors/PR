<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chasing Majors - Automated Print Run Factory</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; }
    .container { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    h1 { color: #38bdf8; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 25px; line-height: 1.6; }
    .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
    .upload-box { background: #0f172a; border: 2px dashed #475569; border-radius: 8px; padding: 30px 15px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .upload-box:hover { border-color: #38bdf8; }
    .upload-box input[type="file"] { display: none; }
    .upload-box .icon { font-size: 24px; margin-bottom: 8px; display: block; }
    .upload-box .label { font-size: 14px; font-weight: 600; color: #cbd5e1; }
    .upload-box .filename { font-size: 12px; color: #10b981; margin-top: 8px; display: none; font-weight: bold; word-break: break-all; }
    textarea, input[type="number"] { width: 100%; background: #0f172a; color: #f8fafc; border: 1px solid #475569; padding: 10px; border-radius: 6px; box-sizing: border-box; }
    label { display:block; font-size:13px; color:#cbd5e1; font-weight:700; margin:16px 0 8px; }
    button { width: 100%; background: #0284c7; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #0369a1; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .status-box { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 4px; display: none; font-size: 14px; line-height: 1.6; white-space: pre-line; }
    .download-btn { display: block; text-align: center; margin-top: 20px; background: #10b981; color: white; padding: 14px; text-decoration: none; font-weight: bold; border-radius: 6px; transition: background 0.2s; }
    .download-btn:hover { background: #059669; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    pre { background:#020617; color:#e2e8f0; padding:15px; border-radius:8px; max-height:430px; overflow:auto; font-size:12px; white-space:pre-wrap; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>
<div class="container">
  <h1>Chasing Majors - Automated Print Run Factory</h1>
  <p>Upload Checklist and Pack Odds PDFs. Counts come from the checklist PDF first. Odds rows inherit parent checklist counts. No manual serial-number or total-pack inputs.</p>

  <div class="upload-row">
    <div class="upload-box" onclick="document.getElementById('checklistFile').click()">
      <span class="icon">📄</span>
      <span class="label">Upload Checklist PDF</span>
      <div id="checkName" class="filename"></div>
      <input type="file" id="checklistFile" accept=".pdf" onchange="handleFileSelect('checklistFile', 'checkName')">
    </div>
    <div class="upload-box" onclick="document.getElementById('oddsFile').click()">
      <span class="icon">📊</span>
      <span class="label">Upload Pack Odds PDF</span>
      <div id="oddsName" class="filename"></div>
      <input type="file" id="oddsFile" accept=".pdf" onchange="handleFileSelect('oddsFile', 'oddsName')">
    </div>
  </div>



  <button id="runBtn" onclick="processUploadedPDFs()">⚡ GENERATE PRINT RUN CSV</button>

  <div id="status" class="status-box"></div>

  <div id="debugArea" style="margin-top:20px;display:none;">
    <h3 style="color:#38bdf8;">Parser Debug View</h3>
    <pre id="debugOutput"></pre>
  </div>

  <div id="downloadArea"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

let generatedCsvData = "";
let generatedDebugData = "";
let productName = "Product_Print_Runs";

function handleFileSelect(inputId, nameId) {
  const file = document.getElementById(inputId).files[0];
  if (file) {
    const nameDiv = document.getElementById(nameId);
    nameDiv.innerText = `✓ ${file.name}`;
    nameDiv.style.display = "block";
  }
}

async function readPdfText(file) {
  const arrayBuffer = await file.arrayBuffer();
  const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
  const pdf = await loadingTask.promise;
  let fullText = "";

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const textContent = await page.getTextContent();

    const items = textContent.items
      .map(item => ({
        str: item.str,
        x: item.transform[4],
        y: Math.round(item.transform[5])
      }))
      .sort((a, b) => (b.y - a.y) || (a.x - b.x));

    const lines = [];
    let currentY = null;
    let row = [];

    items.forEach(item => {
      if (currentY === null || Math.abs(item.y - currentY) <= 2) {
        row.push(item);
        currentY = currentY === null ? item.y : currentY;
      } else {
        row.sort((a,b) => a.x - b.x);
        lines.push(row.map(x => x.str).join(" ").replace(/\s+/g, " ").trim());
        row = [item];
        currentY = item.y;
      }
    });

    if (row.length) {
      row.sort((a,b) => a.x - b.x);
      lines.push(row.map(x => x.str).join(" ").replace(/\s+/g, " ").trim());
    }

    fullText += lines.join("\n") + "\n";
  }
  return fullText;
}

function cleanKey(str) {
  return String(str || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]/g, "")
    .trim();
}

function prettyName(str) {
  return String(str || "").toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function csvEscape(val) {
  if (val === null || val === undefined) return "";
  const s = String(val);
  return `"${s.replace(/"/g, '""')}"`;
}

function isCategoryLine(line) {
  const x = line.trim().toUpperCase();
  return ["BASE", "INSERT", "INSERTS", "AUTOGRAPH", "AUTOGRAPHS", "RELIC", "RELICS", "MEMORABILIA", "VARIATION", "VARIATIONS"].includes(x);
}

function normalizeCategory(line) {
  const x = line.trim().toUpperCase();
  if (x.startsWith("INSERT")) return "INSERT";
  if (x.startsWith("AUTOGRAPH")) return "AUTOGRAPH";
  if (x.startsWith("RELIC") || x === "MEMORABILIA") return "RELIC";
  if (x.startsWith("VARIATION")) return "VARIATION";
  return "BASE";
}

function extractCardCode(line) {
  const s = line.trim();

  // Numeric base rows: 1 Player Team
  let m = s.match(/^(\d{1,4})(?=\s+[A-Za-zÀ-ÖØ-öø-ÿ'’.])/);
  if (m) return { code: m[1], numeric: true };

  // Alpha/digital style rows, including glued rows:
  // BH-1 Anthony, NTN-10Anthony, HRS-ABAce, 89S-ABAce
  m = s.match(/^([A-Z0-9]{1,5}-[A-Z0-9]{1,8})(?=[A-ZÀ-ÖØ-öø-ÿ\s'’.]|$)/);
  if (m) {
    let code = m[1];

    // For glued autograph rows, trim code to the uppercase/card-code run.
    // This keeps HRS-ABAce as HRS-AB, but leaves BYB-10 and NTN-10 intact.
    const parts = code.split("-");
    if (parts[1] && !/^\d+$/.test(parts[1])) {
      const letters = parts[1].match(/^[A-Z0-9]+/);
      if (letters) code = parts[0] + "-" + letters[0];
    }
    return { code, numeric: false };
  }

  return null;
}

function isLikelySubsetHeading(line, category) {
  const s = line.trim();
  if (!s || s.length < 2) return false;
  if (isCategoryLine(s)) return false;
  if (extractCardCode(s)) return false;
  if (/odds|checklists provided|actual contents|card\s+hobby|rookie$/i.test(s)) return false;
  if (category === "BASE" && /^BASE CARDS/i.test(s)) return false;

  // Topps section headings are usually all caps, sometimes with digits.
  const letters = s.replace(/[^A-Za-z]/g, "");
  const upperRatio = letters ? (letters.replace(/[a-z]/g, "").length / letters.length) : 0;
  return upperRatio > 0.75 && s.length <= 55;
}

function parseChecklist(checklistText) {
  const lines = checklistText.split(/\n+/).map(x => x.trim()).filter(Boolean);
  const subsetMap = {};
  const debug = [];
  let category = "BASE";
  let currentSubset = null;
  let baseCodes = new Set();

  function ensureSubset(name, group) {
    const key = cleanKey(name);
    if (!subsetMap[key]) {
      subsetMap[key] = { name, group, codes: new Set(), numericCodes: new Set() };
    }
    return subsetMap[key];
  }

  lines.forEach(line => {
    if (isCategoryLine(line)) {
      category = normalizeCategory(line);
      currentSubset = null;
      return;
    }

    const card = extractCardCode(line);

    if (category === "BASE") {
      if (card && card.numeric) {
        baseCodes.add(card.code);
      }
      return;
    }

    if (isLikelySubsetHeading(line, category)) {
      currentSubset = line.trim();
      ensureSubset(currentSubset, category);
      return;
    }

    if (card && currentSubset) {
      const bucket = ensureSubset(currentSubset, category);
      bucket.codes.add(card.code);
      if (card.numeric) bucket.numericCodes.add(parseInt(card.code, 10));
    }
  });

  let baseCount = baseCodes.size ? Math.max(...Array.from(baseCodes).map(Number)) : 0;

  const finalMap = {};
  if (baseCount > 0) {
    finalMap["base"] = { name: "Base", group: "BASE", size: baseCount };
    debug.push(`[CHECKLIST] Base => ${baseCount} cards (BASE)`);
  }

  Object.keys(subsetMap).forEach(key => {
    const item = subsetMap[key];
    const size = item.codes.size || item.numericCodes.size;
    if (size > 0) {
      finalMap[key] = { name: item.name, group: item.group, size };
      debug.push(`[CHECKLIST] ${item.name} => ${size} cards (${item.group})`);
    }
  });

  return { map: finalMap, debug };
}

const PARALLEL_PHRASES = [
  "pixel burst", "light burst", "green hoops", "orange hoops",
  "rainbow red and orange", "rainbow purple and blue",
  "rainbow green and blue", "rainbow gold and green",
  "rainbow yellow", "rainbow teal", "rainbow",
  "blue and yellow", "red and orange", "purple and blue",
  "green and blue", "gold and green",
  "first round", "second round", "semifinals round", "the finals",
  "nba champions team", "nba champions players", "finals mvp",
  "platinum", "purple", "blue", "green", "gold", "orange", "black", "red", "yellow", "teal",
  "non #d", "non-numbered", "non numbered"
];

function parentKeyFromVariant(name) {
  let s = String(name || "")
    .replace(/\/\d+/g, "")
    .replace(/\([^)]*\)/g, " ");

  PARALLEL_PHRASES.forEach(p => {
    const re = new RegExp("\\b" + p.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "ig");
    s = s.replace(re, " ");
  });

  return cleanKey(s);
}

function parseSerialOverrides() {
  return {};
}

function parseOddsRows(oddsText) {
  const rows = [];
  const lines = oddsText.split(/\n+/).map(x => x.replace(/\s+/g, " ").trim()).filter(Boolean);

  lines.forEach(line => {
    if (/checklists provided|actual contents|card\s+hobby|odds provided/i.test(line)) return;

    const ratioMatches = [...line.matchAll(/(?:^|\s)(\d+)\s*:\s*([\d,]+)/g)];
    if (!ratioMatches.length) return;

    const firstRatio = ratioMatches[0];
    let name = line.slice(0, firstRatio.index).trim();
    name = name.replace(/^Card\s+Hobby.*$/i, "").trim();
    if (!name || name.length < 2) return;

    const odds = ratioMatches.map(m => parseInt(String(m[2]).replace(/,/g, ""), 10)).filter(n => n > 0);
    if (!odds.length) return;

    rows.push({
      variantName: name,
      firstPackRatio: odds[0],
      allRatios: odds
    });
  });

  return rows;
}

function findParentSubset(variantName, checklistMap) {
  const directKey = cleanKey(variantName);
  const parentKey = parentKeyFromVariant(variantName);
  const keys = Object.keys(checklistMap).sort((a,b) => b.length - a.length);

  // Base only if the parent key is exactly base or starts with base from a true base variant.
  if (parentKey === "base" || /^base/.test(parentKey)) {
    return checklistMap["base"] || null;
  }

  if (checklistMap[parentKey]) return checklistMap[parentKey];

  for (const key of keys) {
    if (key === "base") continue;
    if (parentKey === key || parentKey.startsWith(key) || key.startsWith(parentKey)) {
      return checklistMap[key];
    }
  }

  // Try without aggressive descriptor stripping as backup.
  for (const key of keys) {
    if (key === "base") continue;
    if (directKey.startsWith(key)) {
      return checklistMap[key];
    }
  }

  return null;
}

async function processUploadedPDFs() {
  const checkFile = document.getElementById('checklistFile').files[0];
  const oddsFile = document.getElementById('oddsFile').files[0];
  const status = document.getElementById('status');
  const runBtn = document.getElementById('runBtn');
  const downloadArea = document.getElementById('downloadArea');
  const debugArea = document.getElementById('debugArea');
  const debugOutput = document.getElementById('debugOutput');

  if (!checkFile || !oddsFile) {
    alert("Please select both your Checklist and Pack Odds PDF files first.");
    return;
  }

  status.style.display = "block";
  runBtn.disabled = true;
  downloadArea.innerHTML = "";
  debugArea.style.display = "none";
  debugOutput.textContent = "";

  try {
    status.innerHTML = "🔄 Reading checklist PDF...";
    const checklistText = await readPdfText(checkFile);

    status.innerHTML = "🔄 Reading odds PDF...";
    const oddsText = await readPdfText(oddsFile);

    status.innerHTML = "🧮 Parsing checklist counts and mapping odds rows...";

    const titleMatch = (checkFile.name || "").replace(/\.pdf$/i, "").replace(/[_-]/g, " ");
    productName = titleMatch || "Topps Compiled Product Run";

    const parsedChecklist = parseChecklist(checklistText);
    const checklistMap = parsedChecklist.map;
    const oddsRows = parseOddsRows(oddsText);

    const debugLog = [
      "=== CHECKLIST COUNTS ===",
      ...parsedChecklist.debug,
      "",
      "=== ODDS ROW MATCHES ==="
    ];

    const csvRows = [
      ["Product Name", "Product Group Type", "Card Variant Type/Name", "Parent Checklist", "Checklist Subset Size (C)", "Pack Odds Used", "Cards Per Pack Estimate", "Formula", "Notes"]
    ];

    oddsRows.forEach(row => {
      const parent = findParentSubset(row.variantName, checklistMap);
      if (!parent) {
        debugLog.push(`[UNMATCHED] ${row.variantName}`);
        return;
      }

      const checklistCount = parent.size;
      const groupType = parent.group;
      const parentName = parent.name;
      const cardsPerPackEstimate = checklistCount && row.firstPackRatio
        ? `1 card per ${row.firstPackRatio} packs across ${checklistCount} cards`
        : "";

      const formula = checklistCount && row.firstPackRatio
        ? `Print run per card = Total Packs / ${row.firstPackRatio} / ${checklistCount}`
        : "";

      debugLog.push(`[MATCH] ${row.variantName} -> ${parentName} -> ${checklistCount} cards (${groupType})`);

      csvRows.push([
        productName,
        groupType,
        row.variantName,
        parentName,
        checklistCount,
        `1:${row.firstPackRatio}`,
        cardsPerPackEstimate,
        formula,
        "No manual serial or total-pack input used"
      ]);
    });

    const csvContent = csvRows.map(row => row.map(csvEscape).join(",")).join("\n");
    generatedCsvData = "data:text/csv;charset=utf-8," + encodeURIComponent(csvContent);

    const debugText = debugLog.join("\n");
    generatedDebugData = "data:text/plain;charset=utf-8," + encodeURIComponent(debugText);

    debugArea.style.display = "block";
    debugOutput.textContent = debugText;

    status.innerHTML = `✅ Analysis complete.\nChecklist subsets detected: ${Object.keys(checklistMap).length}\nOdds rows parsed: ${oddsRows.length}\nNo manual serial or total-pack inputs used.`;
    downloadArea.innerHTML = `
      <button onclick="downloadCSV()" class="download-btn" style="width:100%; border:none; cursor:pointer;">📥 DOWNLOAD PRINT RUN CSV</button>
      <button onclick="downloadDebug()" class="download-btn" style="width:100%; border:none; cursor:pointer; background:#64748b;">🧪 DOWNLOAD DEBUG TXT</button>
    `;

  } catch (error) {
    console.error(error);
    status.innerHTML = "❌ Processing failure: " + error.message;
  } finally {
    runBtn.disabled = false;
  }
}

function downloadCSV() {
  const link = document.createElement("a");
  link.setAttribute("href", generatedCsvData);
  link.setAttribute("download", `${productName.replace(/[^a-zA-Z0-9]/g, '_')}_print_runs.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function downloadDebug() {
  const link = document.createElement("a");
  link.setAttribute("href", generatedDebugData);
  link.setAttribute("download", `${productName.replace(/[^a-zA-Z0-9]/g, '_')}_parser_debug.txt`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
</body>
