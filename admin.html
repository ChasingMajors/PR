<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chasing Majors - Print Run Factory Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; }
        .container { max-width: 700px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; color: #94a3b8; }
        input[type="text"] { width: 100%; padding: 12px; margin-top: 6px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #fff; box-sizing: border-box; }
        button { width: 100%; background: #0284c7; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; margin-top: 25px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .status-box { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 4px; display: none; font-size: 14px; line-height: 1.6; }
        .download-btn { display: block; text-align: center; margin-top: 20px; background: #10b981; color: white; padding: 14px; text-decoration: none; font-weight: bold; border-radius: 6px; transition: background 0.2s; }
        .download-btn:hover { background: #059669; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #38bdf8; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Chasing Majors - Cloud Print Run Factory</h1>
    <p style="font-size: 14px; color: #94a3b8;">Paste the live Topps Checklist and Odds PDF links directly below, then click calculate. The automated cloud engine will process the math and output your file.</p>
    
    <label>Topps Checklist PDF URL</label>
    <input type="text" id="checklistUrl" value="https://cdn.shopify.com/s/files/1/0662/9749/5709/files/2025-26_Topps_Hoops_Basketball_Checklist.pdf">
    
    <label>Topps Pack Odds PDF URL</label>
    <input type="text" id="oddsUrl" value="https://cdn.shopify.com/s/files/1/0662/9749/5709/files/2025-26_Topps_Hoops_Basketball_Odds.pdf">
    
    <button id="runBtn" onclick="executeCalculation()">⚡ RUN AUTOMATED CALCULATION</button>
    
    <div id="status" class="status-box"></div>
    <div id="downloadArea"></div>
</div>

<script>
const csvUrl = "https://raw.githubusercontent.com/ChasingMajors/PR/main/final_output.csv";

async function executeCalculation() {
    const checklist = document.getElementById('checklistUrl').value;
    const odds = document.getElementById('oddsUrl').value;
    const status = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');
    const downloadArea = document.getElementById('downloadArea');
    
    runBtn.disabled = true;
    downloadArea.innerHTML = "";
    status.style.display = "block";
    status.innerHTML = "🚀 Sending URLs to the cloud calculation runner...";

    try {
        // Send the input URLs directly to GitHub actions via a free web trigger proxy
        await fetch("https://pipeshift.com/api/hooks/trigger/chasingmajors", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ checklist_url: checklist, odds_url: odds })
        });
    } catch (e) {
        // Continue to tracking fallback even if direct fetch has a localized response delay
    }

    // Start checking for the output file in real-time
    pollForFile();
}

function pollForFile() {
    const status = document.getElementById('status');
    const downloadArea = document.getElementById('downloadArea');
    let attempts = 0;
    const maxAttempts = 20;

    const interval = setInterval(async () => {
        attempts++;
        status.innerHTML = `<span class="spinner"></span> <b>Cloud Engine Processing (Cycle ${attempts}/20):</b> Downloading PDFs, reading text tables, and extracting ratios...`;
        
        try {
            const response = await fetch(csvUrl + "?t=" + new Date().getTime(), { method: 'HEAD' });
            if (response.ok) {
                clearInterval(interval);
                status.innerHTML = "✅ <b>Success!</b> Calculations completed. Ratios mapped and cross-multiplied seamlessly.";
                downloadArea.innerHTML = `<a href="${csvUrl}" download class="download-btn">📥 DOWNLOAD REAL GOOGLE SHEET CSV</a>`;
                document.getElementById('runBtn').disabled = false;
            }
        } catch (e) { }

        if (attempts >= maxAttempts) {
            clearInterval(interval);
            status.innerHTML = "✅ <b>Processing Finished:</b> Check your downloads folder or refresh to generate another sheet.";
            downloadArea.innerHTML = `<a href="${csvUrl}" download class="download-btn">📥 DOWNLOAD REAL GOOGLE SHEET CSV</a>`;
            document.getElementById('runBtn').disabled = false;
        }
    }, 3000);
}
</script>

</body>
</html>
