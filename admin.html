<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chasing Majors - Dynamic Print Run Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; }
        .container { max-width: 750px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        p { font-size: 14px; color: #94a3b8; margin-bottom: 25px; line-height: 1.6; }
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .upload-box { background: #0f172a; border: 2px dashed #475569; border-radius: 8px; padding: 30px 15px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
        .upload-box:hover { border-color: #38bdf8; }
        .upload-box input[type="file"] { display: none; }
        .upload-box .icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .upload-box .label { font-size: 14px; font-weight: 600; color: #cbd5e1; }
        .upload-box .filename { font-size: 12px; color: #10b981; margin-top: 8px; display: none; font-weight: bold; word-break: break-all; }
        button { width: 100%; background: #0284c7; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .status-box { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 4px; display: none; font-size: 14px; line-height: 1.6; white-space: pre-line; }
        .download-btn { display: block; text-align: center; margin-top: 20px; background: #10b981; color: white; padding: 14px; text-decoration: none; font-weight: bold; border-radius: 6px; transition: background 0.2s; }
        .download-btn:hover { background: #059669; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Chasing Majors - Automated Print Run Factory</h1>
    <p>Upload your local Checklist and Pack Odds PDFs. The engine will run advanced textual pattern matching to find insert block codes, dynamically calculate checklist sizes, and export the balanced calculations.</p>
    
    <div class="upload-row">
        <div class="upload-box" onclick="document.getElementById('checklistFile').click()">
            <span class="icon">📄</span>
            <span class="label">Upload Checklist PDF</span>
            <div id="checkName" class="filename"></div>
            <input type="file" id="checklistFile" accept=".pdf" onchange="handleFileSelect('checklistFile', 'checkName')">
        </div>

        <div class="upload-box" onclick="document.getElementById('oddsFile').click()">
            <span class="icon">📊</span>
            <span class="label">Upload Pack Odds PDF</span>
            <div id="oddsName" class="filename"></div>
            <input type="file" id="oddsFile" accept=".pdf" onchange="handleFileSelect('oddsFile', 'oddsName')">
        </div>
    </div>
    
    <button id="runBtn" onclick="processUploadedPDFs()">⚡ GENERATE PRINT RUN CSV</button>
    
    <div id="status" class="status-box"></div>
    <div id="downloadArea"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

let generatedCsvData = "";
let productName = "Product_Print_Runs";

function handleFileSelect(inputId, nameId) {
    const file = document.getElementById(inputId).files[0];
    if (file) {
        const nameDiv = document.getElementById(nameId);
        nameDiv.innerText = `✓ ${file.name}`;
        nameDiv.style.display = "block";
    }
}

async function readPdfText(file) {
    const arrayBuffer = await file.arrayBuffer();
    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
    const pdf = await loadingTask.promise;
    let fullText = "";
    
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        fullText += textContent.items.map(item => item.str).join(" ") + "\n";
    }
    return fullText;
}

// Helper function to extract initials/acronyms to match prefix tracking patterns
function getInitials(str) {
    return str.replace(/[^a-zA-Z0-9\s]/g, '').split(/\s+/).map(w => w[0]).join('').toUpperCase();
}

async function processUploadedPDFs() {
    const checkFile = document.getElementById('checklistFile').files[0];
    const oddsFile = document.getElementById('oddsFile').files[0];
    const status = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');
    const downloadArea = document.getElementById('downloadArea');
    
    if (!checkFile || !oddsFile) {
        alert("Please select both your Checklist and Pack Odds PDF files first.");
        return;
    }
    
    status.style.display = "block";
    runBtn.disabled = true;
    downloadArea.innerHTML = "";
    
    try {
        status.innerHTML = "🔄 <b>Step 1/3:</b> Reading raw checklist document text strings...";
        const checklistText = await readPdfText(checkFile);
        
        status.innerHTML = "🔄 <b>Step 2/3:</b> Extracting table lines from pack odds document...";
        const oddsText = await readPdfText(oddsFile);
        
        status.innerHTML = "🧮 <b>Step 3/3:</b> Computing print runs with advanced structural parsing...";
        await new Promise(r => setTimeout(r, 200));

        const titleMatch = checklistText.match(/(202\d-\d+.*?)(?=Checklist|Odds|\n)/i);
        productName = titleMatch ? titleMatch[1].trim() : "Topps Compiled Product Run";

        const csvRows = [
            ["Product Name", "Card Variant Type/Name", "Checklist Subset Size (C)", "Total Production Footprint", "Calculated Print Run Per Player"]
        ];

        // Core production constant
        const totalEstimatedPacks = 7627500;

        // Isolate standard table structures tracking odds configurations
        const oddsLines = oddsText.split("\n");
        const ratioRegex = /([A-Za-z0-9\s#&\-\/\’\‘\“\”\(\)]+?)\s*(?:1\s*:\s*([\d\.,]+))/g;

        let matchPoolText = oddsText;
        let match;

        while ((match = ratioRegex.exec(matchPoolText)) !== null) {
            let variantName = match[1].trim();
            let packRatio = parseFloat(match[2].replace(/,/g, ''));

            if (!variantName || isNaN(packRatio) || packRatio <= 0) continue;
            if (["pack odds", "odds per", "minimum", "retail configuration", "total packs"].some(x => variantName.toLowerCase().includes(x))) continue;
            if (variantName.length < 3 || variantName.length > 80) continue;

            // DYNAMIC CHECKLIST DETECTOR ENGINE
            let checklistCount = 0;
            let plainVariantName = variantName.split('(')[0].replace(/[^a-zA-Z0-9\s]/g, '').trim();

            // A. Base Card Identifier Check
            if (plainVariantName.toLowerCase().startsWith("base") && !plainVariantName.toLowerCase().includes("insert") && !plainVariantName.toLowerCase().includes("auto")) {
                checklistCount = 300;
            } else {
                // B. Upgraded Advanced Prefix and Token Range Identifier Strategy
                // Step 1: Generate dynamic target code initials (e.g. "Bounce House" -> "BH")
                let prefixInitials = getInitials(plainVariantName);
                
                // Step 2: Formulate dynamic multi-condition structural scanners
                // This checks for common card identifiers like "BH-1", "BH-25", "NEX-1", etc.
                let patternString = `(?:^|\\s)(?:[A-Z]{1,4}|${prefixInitials})[-_]?(\\d+)(?:\\s|$)`;
                let dynamicBlockRegex = new RegExp(patternString, 'g');
                
                // Isolate surrounding block strings within checklist text array to verify bounds safely
                let uniqueNumbers = new Set();
                let subMatch;
                
                // Scan document layout for matches
                while ((subMatch = dynamicBlockRegex.exec(checklistText)) !== null) {
                    let val = parseInt(subMatch[1]);
                    if (val > 0 && val <= 150) { // Standard subset bound limits
                        uniqueNumbers.add(val);
                    }
                }

                // If specific block numbering is found, get the max count size
                if (uniqueNumbers.size > 1) {
                    checklistCount = Math.max(...Array.from(uniqueNumbers));
                }

                // Step 3: Text Search Fallback Rule
                if (checklistCount <= 1) {
                    const escapeVariant = plainVariantName.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                    const textScanRegex = new RegExp(`(?:${escapeVariant})\\s*.*?(\\d+)`, 'gi');
                    let textMatch;
                    let maxNum = 0;
                    while ((textMatch = textScanRegex.exec(checklistText)) !== null) {
                        let num = parseInt(textMatch[1]);
                        if (num > maxNum && num < 200) maxNum = num;
                    }
                    checklistCount = maxNum > 0 ? maxNum : 25; // Safe insert default if completely isolated
                }
            }

            // Calculations execution pass
            let totalFootprint = 0;
            let calculatedPrintRun = 0;

            const explicitSerialMatch = variantName.match(/\/(\d+)/);
            if (explicitSerialMatch) {
                calculatedPrintRun = parseInt(explicitSerialMatch[1]);
                totalFootprint = calculatedPrintRun * checklistCount;
            } else {
                totalFootprint = Math.round(totalEstimatedPacks / packRatio);
                calculatedPrintRun = Math.round(totalFootprint / checklistCount);
            }

            if (calculatedPrintRun > 0 && totalFootprint > 0) {
                csvRows.push([
                    productName,
                    variantName,
                    checklistCount,
                    totalFootprint,
                    calculatedPrintRun
                ]);
            }
        }

        const csvContent = csvRows.map(row => row.map(val => {
            if (typeof val === 'string') {
                return `"${val.replace(/"/g, '""')}"`;
            }
            return val;
        }).join(",")).join("\n");

        generatedCsvData = "data:text/csv;charset=utf-8," + encodeURIComponent(csvContent);
        
        status.innerHTML = `✅ <b>Analysis Complete!</b>\nProduct: <b>${productName}</b>\nCalculated layout profiles built successfully.`;
        downloadArea.innerHTML = `<button onclick="downloadCSV()" class="download-btn" style="width:100%; border:none; cursor:pointer;">📥 DOWNLOAD COMPLETED GOOGLE SHEET CSV</button>`;
        
    } catch (error) {
        console.error(error);
        status.innerHTML = "❌ <b>Processing Failure:</b> An error occurred parsing the tables inside the provided PDF files.";
    } finally {
        runBtn.disabled = false;
    }
}

function downloadCSV() {
    const link = document.createElement("a");
    link.setAttribute("href", generatedCsvData);
    link.setAttribute("download", `${productName.replace(/[^a-zA-Z0-9]/g, '_')}_Calculated_Runs.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
