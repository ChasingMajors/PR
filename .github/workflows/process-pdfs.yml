name: Chasing Majors Dynamic PDF Processor

on:
  push:
    paths:
      - 'current_links.json'

jobs:
  calculate_print_runs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: Install PDF & Math Engines
      run: |
        python -m pip install --upgrade pip
        pip install pypdf requests pandas

    - name: Run Dynamic Math Engine
      run: |
        python compute.py

    - name: Save Compiled Sheet to Main Branch
      run: |
        git config --global user.name "Chasing Majors Engine"
        git config --global user.email "engine@chasingmajors.com"
        git add final_output.csv
        git commit -m "Dynamic calculation update from live input links [skip ci]" || exit 0
        git push
